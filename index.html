<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaVoice - AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .status-badge {
            position: absolute;
            top: 2rem;
            background: var(--surface);
            padding: 0.5rem 1rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #334155;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .dot.live {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .dot.speaking {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .orb-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .call-button {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            background: var(--surface);
            color: var(--text-main);
            font-size: 2rem;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: background 0.3s;
        }

        /* The visualizer will dynamically inject scale values here */
        .call-button.active {
            background: var(--danger);
            color: white;
            transform: scale(var(--mic-scale, 1));
        }

        .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--accent);
            opacity: 0;
            pointer-events: none;
            transform: scale(var(--ai-scale, 1));
            transition: transform 0.05s ease-out, opacity 0.1s;
        }

        .speaking-mode .ring {
            opacity: 0.8;
        }

        .transcript-container {
            width: 90%;
            max-width: 500px;
            height: 300px;
            background: var(--surface);
            border-radius: 16px;
            padding: 1rem;
            overflow-y: auto;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            font-size: 0.95rem;
            line-height: 1.5;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            max-width: 80%;
            width: fit-content;
            word-wrap: break-word;
        }

        .user-msg {
            background: #334155;
            align-self: flex-end;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai-msg {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            align-self: flex-start;
            color: #60a5fa;
            border-bottom-left-radius: 4px;
        }

        .system-msg {
            align-self: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .tool-card {
            align-self: center;
            background: rgba(16, 185, 129, 0.1);
            border: 1px dashed var(--success);
            color: #34d399;
            font-family: monospace;
            font-size: 0.85rem;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            width: 90%;
            box-sizing: border-box;
            white-space: pre-wrap;
        }

        .setup-modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .setup-modal.hidden {
            display: none;
        }

        .api-input {
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            width: 300px;
            margin-bottom: 1rem;
        }

        .btn-start {
            padding: 1rem 2rem;
            border-radius: 8px;
            background: var(--success);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn-start:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(16,185,129,0.4); }

        /* ── Mode Tabs ─────────────────────────────── */
        .mode-tabs {
            display: flex;
            gap: 0;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid #334155;
            overflow: hidden;
            margin-bottom: 1.25rem;
            width: 90%;
            max-width: 500px;
        }
        .tab-btn {
            flex: 1;
            padding: 0.65rem 1rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .tab-btn.active {
            background: rgba(59,130,246,0.15);
            color: var(--accent);
        }
        .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.04); color: var(--text-main); }

        /* ── Text Chat Panel ────────────────────────── */
        .text-panel {
            display: none;
            flex-direction: column;
            width: 90%;
            max-width: 500px;
            gap: 0;
        }
        .text-panel.visible { display: flex; }

        .text-input-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        .text-input {
            flex: 1;
            padding: 0.85rem 1.1rem;
            border-radius: 12px;
            border: 1px solid #334155;
            background: var(--surface);
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            resize: none;
            min-height: 46px;
            max-height: 120px;
            overflow-y: auto;
            line-height: 1.5;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .text-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .text-input::placeholder { color: #4b5563; }

        .send-btn {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
            align-self: flex-end;
        }
        .send-btn:hover { background: #2563eb; transform: scale(1.07); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { background: #334155; cursor: not-allowed; transform: none; }

        /* ── Typing indicator ────────────────────────── */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0.6rem 0.9rem;
            border-radius: 12px;
            background: rgba(59,130,246,0.08);
            border: 1px solid rgba(59,130,246,0.15);
            align-self: flex-start;
            width: fit-content;
        }
        .typing-indicator span {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #3b82f6;
            display: inline-block;
            animation: bounce 1.2s ease-in-out infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-6px); opacity: 1; }
        }

        /* ── Voice panel layout fix ─────────────────── */
        .voice-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .voice-panel.hidden { display: none; }
    </style>
</head>

<body>

    <div id="setupModal" class="setup-modal">
        <h2 style="font-size:1.6rem;margin-bottom:0.4rem;">Welcome to NovaVoice</h2>
        <p style="color:#64748b;margin-bottom:1.5rem;font-size:0.9rem;">Connect your Gemini API key to start</p>
        <input type="password" id="apiKey" class="api-input" placeholder="Enter Gemini API Key (AIza...)">
        <button id="startSessionBtn" class="btn-start">Connect to Agent</button>
    </div>

    <div class="status-badge" id="statusBadge">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Disconnected</span>
    </div>

    <!-- Mode Tabs -->
    <div class="mode-tabs" id="modeTabs">
        <button class="tab-btn active" id="tabVoice" onclick="switchMode('voice')">🎙️ Voice</button>
        <button class="tab-btn" id="tabText" onclick="switchMode('text')">💬 Text Chat</button>
    </div>

    <!-- Voice Panel -->
    <div class="voice-panel" id="voicePanel">
        <div class="orb-container" id="orbContainer">
            <div class="ring"></div>
            <button class="call-button" id="callBtn">🎙️</button>
        </div>
        <div class="transcript-container" id="transcript">
            <div class="message system-msg">Waiting to connect...</div>
        </div>
    </div>

    <!-- Text Chat Panel -->
    <div class="text-panel" id="textPanel">
        <div class="transcript-container" id="textTranscript" style="height:340px;">
            <div class="message system-msg">Type a message below to chat with the AI ✨</div>
        </div>
        <div class="text-input-row">
            <textarea
                id="textInput"
                class="text-input"
                placeholder="Ask anything…"
                rows="1"
            ></textarea>
            <button class="send-btn" id="sendBtn" title="Send message">➤</button>
        </div>
    </div>

    <script>
        const UI = {
            setupModal: document.getElementById('setupModal'),
            startBtn: document.getElementById('startSessionBtn'),
            apiKeyInput: document.getElementById('apiKey'),
            callBtn: document.getElementById('callBtn'),
            statusText: document.getElementById('statusText'),
            statusDot: document.getElementById('statusDot'),
            transcript: document.getElementById('transcript'),
            orbContainer: document.getElementById('orbContainer'),
            textTranscript: document.getElementById('textTranscript'),
            textInput: document.getElementById('textInput'),
            sendBtn: document.getElementById('sendBtn'),
            voicePanel: document.getElementById('voicePanel'),
            textPanel: document.getElementById('textPanel'),
            tabVoice: document.getElementById('tabVoice'),
            tabText: document.getElementById('tabText')
        };

        let isCallActive = false;
        let ws = null;
        let audioContext = null;
        let mediaStream = null;
        let scriptProcessor = null;
        let nextPlayTime = 0;

        let activeBubble = null;
        let activeRole = null;
        let activeSources = [];

        // Visualizer Nodes
        let micAnalyser = null;
        let aiAnalyser = null;
        let visualizerId = null;

        // Text chat state
        let currentMode = 'voice'; // 'voice' | 'text'
        let textActiveBubble = null;
        let textActiveRole = null;
        let isTextWaiting = false;
        let typingEl = null;

        // ── Mode switcher ──────────────────────────────────────
        function switchMode(mode) {
            currentMode = mode;
            if (mode === 'voice') {
                UI.voicePanel.classList.remove('hidden');
                UI.textPanel.classList.remove('visible');
                UI.tabVoice.classList.add('active');
                UI.tabText.classList.remove('active');
            } else {
                UI.voicePanel.classList.add('hidden');
                UI.textPanel.classList.add('visible');
                UI.tabVoice.classList.remove('active');
                UI.tabText.classList.add('active');
                UI.textInput.focus();
            }
        }

        // Auto-grow textarea
        UI.textInput.addEventListener('input', () => {
            UI.textInput.style.height = 'auto';
            UI.textInput.style.height = Math.min(UI.textInput.scrollHeight, 120) + 'px';
        });

        // Send on Enter (Shift+Enter = newline)
        UI.textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendTextMessage();
            }
        });

        UI.sendBtn.addEventListener('click', sendTextMessage);

        function sendTextMessage() {
            const text = UI.textInput.value.trim();
            if (!text || isTextWaiting) return;
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addTextMessage('⚠️ Not connected. Please enter your API key first.', 'system-msg');
                return;
            }

            // Render user bubble
            addTextMessage(text, 'user-msg');
            UI.textInput.value = '';
            UI.textInput.style.height = 'auto';

            // Show typing indicator
            showTypingIndicator();
            isTextWaiting = true;
            UI.sendBtn.disabled = true;
            textActiveBubble = null;
            textActiveRole = null;

            // Send as a client content turn (text only)
            ws.send(JSON.stringify({
                clientContent: {
                    turns: [{ role: 'user', parts: [{ text }] }],
                    turnComplete: true
                }
            }));
        }

        function showTypingIndicator() {
            removeTypingIndicator();
            typingEl = document.createElement('div');
            typingEl.className = 'typing-indicator';
            typingEl.innerHTML = '<span></span><span></span><span></span>';
            UI.textTranscript.appendChild(typingEl);
            UI.textTranscript.scrollTop = UI.textTranscript.scrollHeight;
        }

        function removeTypingIndicator() {
            if (typingEl) { typingEl.remove(); typingEl = null; }
        }

        function addTextMessage(text, typeClass, isChunk = false) {
            if (isChunk) {
                if (textActiveBubble && textActiveRole === typeClass) {
                    textActiveBubble.innerText += text;
                    UI.textTranscript.scrollTop = UI.textTranscript.scrollHeight;
                    return;
                }
                textActiveBubble = document.createElement('div');
                textActiveBubble.className = `message ${typeClass}`;
                textActiveBubble.innerText = text;
                UI.textTranscript.appendChild(textActiveBubble);
                textActiveRole = typeClass;
            } else {
                const msg = document.createElement('div');
                msg.className = `message ${typeClass}`;
                msg.innerText = text;
                UI.textTranscript.appendChild(msg);
                textActiveBubble = null;
                textActiveRole = null;
            }
            UI.textTranscript.scrollTop = UI.textTranscript.scrollHeight;
        }

        UI.startBtn.addEventListener('click', () => {
            const key = UI.apiKeyInput.value.trim();
            if (!key) return alert("API Key is required.");

            UI.setupModal.classList.add('hidden');
            updateStatus('Connecting...', 'speaking');
            addMessage('Initializing connection to Gemini...', 'system-msg');

            const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${key}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                updateStatus('Ready', 'muted');
                addMessage('System ready. Tap the mic to call.', 'system-msg');

                // 🧠 CONTEXT INJECTION: Give Gemini the exact date and timezone
                const currentDate = new Date().toString();
                const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                const systemPrompt = `You are a professional, helpful booking assistant. 
                CRITICAL CONTEXT: The current date and time is ${currentDate}. The user is in the ${timeZone} timezone. 
                Always check availability first before booking a meeting to prevent double-booking. When booking or checking, format dates strictly to ISO 8601 offset to the user's timezone.`;

                ws.send(JSON.stringify({
                    setup: {
                        model: "models/gemini-3.1-flash-live-preview",
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Charon" } } }
                        },
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        tools: [{
                            functionDeclarations: [
                                {
                                    name: "check_availability",
                                    description: "Checks the user's calendar for busy slots on a given day.",
                                    parameters: {
                                        type: "OBJECT",
                                        properties: {
                                            date: { type: "STRING", description: "ISO 8601 date to check (e.g., 2026-05-26T00:00:00+05:30)" }
                                        },
                                        required: ["date"]
                                    }
                                },
                                {
                                    name: "book_meeting",
                                    description: "Schedules a meeting on the calendar.",
                                    parameters: {
                                        type: "OBJECT",
                                        properties: {
                                            title: { type: "STRING", description: "Meeting title" },
                                            date_time: { type: "STRING", description: "ISO 8601 date and time (e.g., 2026-05-26T09:00:00+05:30)" },
                                            guest_email: { type: "STRING", description: "Guest email address" }
                                        },
                                        required: ["title", "date_time", "guest_email"]
                                    }
                                }
                            ]
                        }]
                    }
                }));
            };

            ws.onmessage = async (event) => {
                const msg = JSON.parse(await event.data.text ? await event.data.text() : event.data);

                if (msg.toolCall) {
                    const functionCalls = msg.toolCall.functionCalls;
                    const responses = [];

                    for (const call of functionCalls) {
                        const args = call.args;
                        console.log("🎯 Tool Triggered:", call.name, args);

                        let endpoint = "";
                        let visualOutput = "";

                        // Handle logic for both tools dynamically
                        if (call.name === "book_meeting") {
                            endpoint = "http://127.0.0.1:5000/api/book_meeting";
                            visualOutput = `⚙️ Action: book_meeting()\n↳ Title: ${args.title}\n↳ Time: ${args.date_time}`;
                        } else if (call.name === "check_availability") {
                            endpoint = "http://127.0.0.1:5000/api/check_availability";
                            visualOutput = `🔍 Action: check_availability()\n↳ Date: ${args.date}`;
                        }

                        addToolCard(visualOutput);

                        try {
                            const res = await fetch(endpoint, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(args)
                            });
                            const data = await res.json();
                            responses.push({ id: call.id, name: call.name, response: { output: data.result } });
                        } catch (error) {
                            console.error("Backend Error:", error);
                            responses.push({ id: call.id, name: call.name, response: { output: "Error connected to local Python API." } });
                        }
                    }

                    ws.send(JSON.stringify({ toolResponse: { functionResponses: responses } }));
                }

                if (msg.serverContent) {
                    const content = msg.serverContent;

                    if (content.interrupted) {
                        setSpeakingState(false);
                        nextPlayTime = audioContext ? audioContext.currentTime : 0;
                        activeBubble = null;
                        activeSources.forEach(source => { try { source.stop(); } catch (e) { } });
                        activeSources = [];
                    }

                    if (content.inputTranscription && content.inputTranscription.text) {
                        addMessage(content.inputTranscription.text + " ", 'user-msg', true);
                    }

                    if (content.outputTranscription && content.outputTranscription.text) {
                        setSpeakingState(true);
                        addMessage(content.outputTranscription.text, 'ai-msg', true);
                    }

                    if (content.modelTurn) {
                        for (const part of content.modelTurn.parts) {
                            if (part.inlineData) {
                                // Audio chunk — only play in voice mode
                                if (currentMode === 'voice') playAudioBase64(part.inlineData.data);
                            }
                            if (part.text) {
                                // Text response from AI — display in text chat panel
                                removeTypingIndicator();
                                addTextMessage(part.text, 'ai-msg', true);
                            }
                        }
                    }

                    if (content.turnComplete) {
                        setSpeakingState(false);
                        activeBubble = null;
                        // Re-enable text input
                        if (isTextWaiting) {
                            removeTypingIndicator();
                            isTextWaiting = false;
                            UI.sendBtn.disabled = false;
                            textActiveBubble = null;
                            textActiveRole = null;
                        }
                    }
                }
            };
        });

        UI.callBtn.addEventListener('click', async () => {
            isCallActive = !isCallActive;

            if (isCallActive) {
                UI.callBtn.classList.add('active');
                UI.callBtn.innerHTML = '⏹️';
                updateStatus('Listening...', 'live');
                addMessage('Microphone active. Say hello!', 'system-msg');

                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                    nextPlayTime = audioContext.currentTime;

                    // Setup Visualizers
                    micAnalyser = audioContext.createAnalyser();
                    aiAnalyser = audioContext.createAnalyser();
                    micAnalyser.fftSize = 256;
                    aiAnalyser.fftSize = 256;
                    startVisualizer();

                    mediaStream = await navigator.mediaDevices.getUserMedia({
                        audio: { echoCancellation: true, noiseSuppression: true }
                    });

                    const source = audioContext.createMediaStreamSource(mediaStream);
                    source.connect(micAnalyser); // Connect Mic to Analyser

                    scriptProcessor = audioContext.createScriptProcessor(1024, 1, 1);
                    scriptProcessor.onaudioprocess = (e) => {
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            const float32Data = e.inputBuffer.getChannelData(0);
                            ws.send(JSON.stringify({
                                realtimeInput: {
                                    audio: { mimeType: "audio/pcm;rate=16000", data: float32ToBase64(float32Data) }
                                }
                            }));
                        }
                    };

                    source.connect(scriptProcessor);
                    scriptProcessor.connect(audioContext.destination);

                } catch (err) {
                    isCallActive = false;
                    UI.callBtn.classList.remove('active');
                    UI.callBtn.innerHTML = '🎙️';
                    updateStatus('Ready', 'muted');
                }
            } else {
                UI.callBtn.classList.remove('active');
                UI.callBtn.innerHTML = '🎙️';
                UI.orbContainer.classList.remove('speaking-mode');
                updateStatus('Call Ended', 'muted');

                if (visualizerId) cancelAnimationFrame(visualizerId);
                UI.callBtn.style.setProperty('--mic-scale', '1');
                UI.orbContainer.style.setProperty('--ai-scale', '1');

                if (scriptProcessor) scriptProcessor.disconnect();
                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                if (audioContext) audioContext.close();
            }
        });

        // 🎵 VISUALIZER ENGINE
        function startVisualizer() {
            const micData = new Uint8Array(micAnalyser.frequencyBinCount);
            const aiData = new Uint8Array(aiAnalyser.frequencyBinCount);

            function render() {
                if (!isCallActive) return;

                micAnalyser.getByteFrequencyData(micData);
                aiAnalyser.getByteFrequencyData(aiData);

                // Calculate average volume
                const micVol = micData.reduce((a, b) => a + b, 0) / micData.length;
                const aiVol = aiData.reduce((a, b) => a + b, 0) / aiData.length;

                // Map volume (0-255) to scale factor (1.0 to 1.3)
                const micScale = 1 + (micVol / 255) * 0.15;
                const aiScale = 1 + (aiVol / 255) * 0.8;

                UI.callBtn.style.setProperty('--mic-scale', micScale);
                UI.orbContainer.style.setProperty('--ai-scale', aiScale);

                visualizerId = requestAnimationFrame(render);
            }
            render();
        }

        function float32ToBase64(float32Array) {
            let buffer = new ArrayBuffer(float32Array.length * 2);
            let view = new DataView(buffer);
            for (let i = 0; i < float32Array.length; i++) {
                let s = Math.max(-1, Math.min(1, float32Array[i]));
                view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            let binary = '';
            let bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) { binary += String.fromCharCode(bytes[i]); }
            return btoa(binary);
        }

        function playAudioBase64(base64) {
            if (!audioContext) return;

            let binary = atob(base64);
            let buffer = new ArrayBuffer(binary.length);
            let view = new DataView(buffer);
            for (let i = 0; i < binary.length; i++) { view.setUint8(i, binary.charCodeAt(i)); }

            const int16Array = new Int16Array(buffer);
            const audioBuffer = audioContext.createBuffer(1, int16Array.length, 24000);
            const channelData = audioBuffer.getChannelData(0);

            for (let i = 0; i < int16Array.length; i++) { channelData[i] = int16Array[i] / 32768.0; }

            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;

            // Connect AI audio to our Visualizer Analyser Node
            source.connect(aiAnalyser);
            aiAnalyser.connect(audioContext.destination);

            const startTime = Math.max(audioContext.currentTime, nextPlayTime);
            source.start(startTime);
            nextPlayTime = startTime + audioBuffer.duration;

            activeSources.push(source);
            source.onended = () => { activeSources = activeSources.filter(s => s !== source); };
        }

        function updateStatus(text, dotClass) {
            UI.statusText.innerText = text; UI.statusDot.className = `dot ${dotClass}`;
        }
        function addToolCard(text) {
            const card = document.createElement('pre'); card.className = 'tool-card'; card.innerText = text;
            UI.transcript.appendChild(card); UI.transcript.scrollTop = UI.transcript.scrollHeight;
            activeBubble = null; activeRole = null;
        }
        function setSpeakingState(isSpeaking) {
            if (isSpeaking) {
                UI.orbContainer.classList.add('speaking-mode'); updateStatus('Agent Speaking...', 'speaking');
            } else {
                UI.orbContainer.classList.remove('speaking-mode'); if (isCallActive) updateStatus('Listening...', 'live');
            }
        }
        function addMessage(text, typeClass, isChunk = false) {
            if (isChunk) {
                if (activeBubble && activeRole === typeClass) {
                    activeBubble.innerText += text; UI.transcript.scrollTop = UI.transcript.scrollHeight; return;
                }
                activeBubble = document.createElement('div'); activeBubble.className = `message ${typeClass}`; activeBubble.innerText = text;
                UI.transcript.appendChild(activeBubble); activeRole = typeClass;
            } else {
                const msg = document.createElement('div'); msg.className = `message ${typeClass}`; msg.innerText = text;
                UI.transcript.appendChild(msg); activeBubble = null; activeRole = null;
            }
            UI.transcript.scrollTop = UI.transcript.scrollHeight;
        }
    </script>
</body>
